# ============================================================
# DATABASE - defaults to H2 in-memory so you can run this
# immediately without installing MySQL first.
# To use real MySQL instead, comment out the H2 block below
# and uncomment the MySQL block.
# ============================================================

# --- H2 (default, zero setup) ---
spring.datasource.url=jdbc:h2:mem:propertydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# --- MySQL (uncomment to use real MySQL) ---
# 1. Install MySQL locally or use a free hosted instance (e.g. Railway, PlanetScale)
# 2. Create a database: CREATE DATABASE property_mgmt;
# 3. Uncomment these 4 lines and comment out the H2 block above:
# spring.datasource.url=jdbc:mysql://localhost:3306/property_mgmt?createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE

# Auto-create/update tables from @Entity classes - convenient while learning;
# real production projects typically use a migration tool (Flyway/Liquibase) instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT
# ============================================================
# IMPORTANT: in a real deployment, move this secret to an environment
# variable instead of committing it to source control. This value is
# only fine for local learning/demo purposes.
app.jwt.secret=this-is-a-demo-secret-key-please-change-it-before-deploying-anywhere-32bytes-min
app.jwt.expiration-ms=86400000

# ============================================================
# SERVER
# ============================================================
server.port=8080
